<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Stock Trading Dashboard</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">📈 Stock Dashboard</span>

<button class="btn btn-outline-light btn-sm"
onclick="toggleDarkMode()">
Dark Mode
</button>

</div>

</nav>

<div class="container mt-4">

<div class="row">

<div class="col-md-8">

<div class="card shadow-sm">

<div class="card-header bg-primary text-white">
Search Stocks
</div>

<div class="card-body">

<input type="text"
id="search"
class="form-control"
placeholder="Search stock name or symbol">

</div>

</div>

<div class="mt-3">

<button class="btn btn-sm btn-outline-primary"
onclick="sortByPrice()">
Sort by Price
</button>

<button class="btn btn-sm btn-outline-success"
onclick="sortByChange()">
Sort by Change
</button>

</div>

<div class="row mt-3"
id="stockContainer"></div>

<div id="noStocks"
class="text-center text-muted mt-4"
style="display:none;">
<h5>No stocks found</h5>
</div>

</div>

<div class="col-md-4">

<div class="card shadow-sm">

<div class="card-header bg-success text-white">
⭐ Watchlist
</div>

<ul class="list-group list-group-flush"
id="watchlist"></ul>

<div id="emptyWatchlist"
class="text-center p-3 text-muted">
No favorites yet
</div>

</div>

</div>

</div>

</div>

<div class="modal fade"
id="chartModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Stock Chart
</h5>

<button class="close"
data-dismiss="modal">
&times;
</button>

</div>

<div class="modal-body">

<canvas id="stockChart"></canvas>

</div>

</div>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
